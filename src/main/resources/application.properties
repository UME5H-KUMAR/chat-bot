spring.application.name=chat-bot

server.port=8080
server.servlet.context-path=/api


spring.ai.chat.client.enabled=false

spring.ai.ollama.base-url=http://localhost:11434
# spring.ai.ollama.chat.options.model=phi3.5
spring.ai.ollama.chat.options.model=llama3.2:3b 
spring.ai.ollama.chat.options.temperature=0.5


spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${openai_api_key}
# spring.ai.openai.chat.options.model=openai/gpt-4o-mini
spring.ai.openai.chat.options.model=openai/gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3

spring.ai.google.genai.api-key=${gemini_api_key}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3

logging.level.org.springframework.ai.chat.client.advisor=DEBUG



#Database configuration for chat memory
spring.datasource.url=jdbc:postgresql://localhost:5432/chatBotDB
spring.datasource.username=postgres
spring.datasource.password=6969
spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS
# spring.datasource.driver-class-name=org.postgresql.Driver
